          description: GeotekniskBorehull not found
        "200":
          description: Returns the GeotekniskBorehull you want to fetch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeotekniskBorehull"
      security:
      - Authentication: []
    delete:
      summary: Deletes a GeotekniskBorehull.
      description: Deletes a GeotekniskBorehull.
      parameters:
      - description: The GeotekniskBorehull id.
        required: true
        schema:
          type: string
        name: geotekniskBorehullId
        in: path
      - description: The GeotekniskUnders owner of the GeotekniskBorehull.
        required: true
        schema:
          type: string
        name: geotekniskUndersId
        in: path
      responses:
        "204":
