          description: korreksjonsfaktor for trykksonde ved korreksjon av målt spissmotstand
            for poretrykkseffekter<engelsk>correction factor for measured cone resistance
            for pore pressure effects</engelsk>
        spissType:
          type: string
          description: "type trykksonde, avhengig av størrelse og instrumentering<engelsk>type\
