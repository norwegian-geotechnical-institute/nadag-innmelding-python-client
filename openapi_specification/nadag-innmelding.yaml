            $ref: "#/components/schemas/PoretrykkDataInsitu"
          description: ""
        trykksonderingObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/TrykksonderingData"
          description: ""
        dissipasjonObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DissipasjonData"
          description: ""
    TrykksonderingData:
      type: object
      description: data fra utførelse av trykksondering (med poretrykksmåling) CPT(U)<engelsk>data
        fra performance of cone penetration test (with pore pressure measurements)
        CPT(U)</engelsk>
      properties:
        anvendtLast:
          type: number
