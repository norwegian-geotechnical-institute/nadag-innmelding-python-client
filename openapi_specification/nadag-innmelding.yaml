            \ of the probe to the requested or any other given depth. Referring to\
            \ the previous depth</engelsk>"
        observasjonKode:
          type: string
          description: observasjonskoder for markering av hendelser i trykksonderingen.
            Kodene er (0..*) tallkoder gitt i en tekststreng med mellomrom mellom
            hver kode hvis mer enn 1. Kodene er beskrevet i kodelisten GeotekniskBoreObservasjonskode.  <engelsk>observation
            codes for marking of incidents during penetration. The codes are (0..*)
            numeric codes given in a text string with spaces between each code if
            more than 1. The codes are described in the code list GeotekniskBoreObservasjonskode.
            </engelsk>
        observasjonMerknad:
          type: string
          maxLength: 255
          description: merknad til observasjoner i trykksonderingen <engelsk>remarks
            to observations made during penetration</engelsk>
        poretrykk:
          type: number
          format: double
          description: "vanntrykket i porevannet i grunnen, med atmosfæretrykket som\
            \ referanse [kPa] <engelsk>the pressure in the pore water, with the atmospheric\
            \ pressure as reference</engelsk>"
        skjærbølgeHastighet:
          type: number
          format: double
          description: "hastighet til s-bølge [m/s] <engelsk>velocity of s-wave</engelsk>"
        temperatur:
          type: number
          format: double
          description: "temperatur i jord og/eller luft ved gjennomføring av trykksonderingen\
            \ [°C] <engelsk>temperature in soil and/or air during the testing</engelsk>"
        nedpressingTrykk:
          type: number
          format: double
          description: "målt spissmotstand ved nedpressing av trykksonde (spisskraft\
            \ dividert med tverrsnittsareal av trykksonde) [MPa] <engelsk>measured\
            \ cone resistance during penetration of the probe (point load divided\
