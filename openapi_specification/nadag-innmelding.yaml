    Identifikasjon:
      type: object
      required:
      - lokalId
      - navnerom
      description: "Unik identifikasjon av et objekt, ivaretatt av den ansvarlige\
        \ produsent/forvalter, som kan benyttes av eksterne applikasjoner som referanse\
        \ til objektet. \r\n\r\nNOTE1 Denne eksterne objektidentifikasjonen må ikke\
        \ forveksles med en tematisk objektidentifikasjon, slik som f.eks bygningsnummer.\
        \ \r\n\r\nNOTE 2 Denne unike identifikatoren vil ikke endres i løpet av objektets\
        \ levetid. "
