            \ sounding</engelsk>"
        rørKappeKorreksjonsFaktor:
          type: number
          format: double
          description: korreksjonsfaktor for bruk av friksjonsreduksjonsring <engelsk>correction
            factor for use of friction reducer</engelsk>
        sidefriksjonKorreksjon:
          type: number
          format: double
          description: korreksjon av målt sidefriksjon på grunn av poretrykkseffekter<engelsk>correction
            of measured sleeve friction due to pore pressure effects</engelsk>
        sondeIdentifikasjon:
          type: string
