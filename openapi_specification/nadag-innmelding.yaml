      parameters:
      - description: The GeotekniskBorehull id.
        required: true
        schema:
          type: string
        name: geotekniskBorehullId
        in: path
      - description: The GeotekniskUnders owner of the new GeotekniskBorehull.
        required: true
        schema:
          type: string
        name: geotekniskUndersId
        in: path
      - description: The epsg code of the geometry.
        required: true
        schema:
          $ref: "#/components/schemas/EpsgCode"
        name: epsgCode
        in: query
      requestBody:
        description: The GeotekniskBorehull to store.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeotekniskBorehull"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatedGeotekniskUnders"
