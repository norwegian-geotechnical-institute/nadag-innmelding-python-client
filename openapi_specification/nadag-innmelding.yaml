---
openapi: 3.1.0
components:
  schemas:
    AkviferType:
      type: string
      enum:
      - ARTESISK
      - LUKKET
      - UTETT
      - ÅPEN
      - IKKE_ANGITT
      description: oversikt over mulige akvifertyper for grunnvannsmålinger<engelsk>overview
        of possible aquifer types for ground water measurements</engelsk>
    AttachmentInfoDto:
      type: object
      description: Attachment info result
      properties:
        attachmentId:
          type: string
        uniqId:
          type: string
    AttachmentInfosDto:
      type: object
      description: Attachment infos result
      properties:
        attachmentInfos:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInfoDto"
    BlokkProeve:
      type: object
      description: "fysisk prøvemateriale manuelt skjært ut fra bunnen av en utgravning\
        \ eller ved hjelp av spesialutviklet prøvetakingsutstyr\r\n\r\n<engelsk>physical\
        \ sample manually cut from the bottom of a ditch or with special sample equipment</engelsk>"
      properties:
        jsonType:
          const: BlokkProeve
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        fraBorlengde:
          type: number
          format: double
        tilBorlengde:
          type: number
          format: double
        prøvetype:
          $ref: "#/components/schemas/ProevetakingType"
        densitetPrøvetaking:
          type: number
          format: double
        miljøtekniskUndersøkelse:
          type: string
    BorlengdeTilBerg:
      type: object
      required:
      - borlengdeKvalitet
      description: "dybde til fjell som ikke er målt men basert på tolkning\r\n\r\n\
        <engelsk>\r\ndepth to bedrock based on interpretation\r\n</engelsk>"
      properties:
        borlengdeKvalitet:
          $ref: "#/components/schemas/KvalitetBorlengdeTilBerg"
        borlengdeTilBerg:
          type: number
          format: double
    Coordinates:
      type: array
      items:
        type: number
        format: double
    CoordinatesList:
      type: array
      items:
        $ref: "#/components/schemas/Coordinates"
    CoordinatesLists:
      type: array
      items:
        $ref: "#/components/schemas/CoordinatesList"
    DeformasjonMaaleData:
      type: object
      description: data fra måling av setning ved angitt måletidspunkt<engelsk>data
        from measurements of settlements at a given time</engelsk>
      properties:
        måleDato:
          type: string
          format: date
          examples:
          - 2022-03-10
        måleTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        deformasjonObservasjonKode:
          $ref: "#/components/schemas/DeformasjonObservasjonKode"
        observasjonMerknad:
          type: string
          maxLength: 255
        setning:
          type: number
          format: double
        deformasjonX:
          type: number
          format: double
        deformasjonY:
          type: number
          format: double
        deformasjonZ:
          type: number
          format: double
        erGyldig:
          type: boolean
        boretLengde:
          type: number
          format: double
        observasjonKode:
          type: string
    DeformasjonMaaling:
      type: object
      description: undersøkelse for måling av setninger og deformasjoner i felt<engelsk>investigation
        for measurement of settlements and deformations in the field</engelsk>
      properties:
        jsonType:
          const: DeformasjonMaaling
        datafangstdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        digitaliseringsmålestokk:
          type: integer
          format: int32
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        kvalitet:
          $ref: "#/components/schemas/PosisjonskvalitetNADAG"
        oppdateringsdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        posisjon:
          $ref: "#/components/schemas/Point"
        observasjonStart:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        observasjonSlutt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        observatør:
          type: string
        opphav:
          type: string
        boreBeskrivelse:
          type: string
        boretAzimuth:
          type: number
          format: double
        boretHelningsgrad:
          type: number
          format: double
        boretLengde:
          type: number
          format: double
        boretLengdeTilBerg:
          $ref: "#/components/schemas/BorlengdeTilBerg"
        dybdeFraGittPosisjon:
          type: number
          format: double
        dybdeFraVannoverflaten:
          type: number
          format: double
        lenkeTilTileggsinfo:
          type: string
        værforholdVedBoring:
          type: string
        høyde:
          type: number
          format: double
        høydeReferanse:
          type: string
        undersøkelseNr:
          type: string
        eksternIdentifikasjon:
          $ref: "#/components/schemas/EksternIdentifikasjon"
        opprettetDato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        dybdeGrunnvannstand:
          type: number
          format: double
        forboretDiameter:
          type: number
          format: double
        forboretLengde:
          type: number
          format: double
        forboringMetode:
          type: string
        stoppKode:
          $ref: "#/components/schemas/GeotekniskStoppkode"
        forboretStartLengde:
          type: number
          format: double
        absoluttverdi:
          type: boolean
        installasjonTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        installasjonNivå:
          type: number
          format: double
        målertype:
          type: string
        målepunkt:
          type: number
          format: double
        harOvervåkningObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DeformasjonOvervaakningData"
        harSetningObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DeformasjonMaaleData"
    DeformasjonObservasjonKode:
      type: string
      enum:
      - IKKESPESIFISERT
      - HINDRING
      - SKADET
      - USIKKERT
      description: Kodeliste for å angi deformasjonsobservasjon
    DeformasjonOvervaakningData:
      type: object
      description: "data fra overvåkning av setningsmåling, grunnvannsstand, poretrykk,\
        \ rystelser eller andre overvåkningsdata<engelsk>data from supervision of\
        \ settlements, groundwater table, pore pressure or any other supervision data</engelsk>"
      properties:
        nedreAlarmNivå:
          type: number
          format: double
        ØvreAlarmNivå:
          type: number
          format: double
        måleDato:
          type: string
          format: date
          examples:
          - 2022-03-10
        måleTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        observasjonMerknad:
          type: string
          maxLength: 255
        akvifer:
          $ref: "#/components/schemas/AkviferType"
    DilatometerTest:
      type: object
      description: "en enkel innretning, formet som et flatt blad designet for å trykkes\
        \ ned i bakken. Merknad: ble utviklet for å bestemme modulus for en jordart.\r\
        \n<engelsk>a simple device, shaped in the form of a flat blade designed to\
        \ be pushed into the ground Note: It was developed to evaluate the soil modulus.</engelsk>"
      properties:
        jsonType:
          const: DilatometerTest
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        fraBorlengde:
          type: number
          format: double
        tilBorlengde:
          type: number
          format: double
        insituTestStartTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        insituTestSluttTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        materialIndeks:
          type: number
          format: double
        horisontalSpenningIndeks:
          type: number
          format: double
        dilatometerModulus:
          type: number
          format: double
        dilatometerObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DilatometerTestData"
    DilatometerTestData:
      type: object
      description: "en enkel innretning, formet som et flatt blad designet for å trykkes\
        \ ned i bakken. Merknad: ble utviklet for å bestemme modulus for en jordart.\r\
        \n<engelsk>a simple device, shaped in the form of a flat blade designed to\
        \ be pushed into the ground Note: It was developed to evaluate the soil modulus.</engelsk>"
      properties:
        boretDybde:
          type: number
          format: double
        observasjonMerknad:
          type: string
          maxLength: 255
        observasjonKode:
          type: string
        kontaktTrykkP0:
          type: number
          format: double
        ekspansjonTrykkP1:
          type: number
          format: double
        horisontalKraft:
          type: number
          format: double
        poretrykk:
          type: number
          format: double
    DissipasjonData:
      type: object
      description: "data fra måling av dissipasjon (drenasje) i felt, aktuelt ved\
        \ utførelse av dissipasjonstest i CPTU<engelsk>data fra måling av dissipasjon\
        \ (drenasje) i felt, aktuelt ved utførelse av dissipasjonstest i CPTU</engelsk>"
      properties:
        boretDybde:
          type: number
          format: double
        dissipasjonsPoretrykkU1:
          type: number
          format: double
        dissipasjonsPoretrykkU2:
          type: number
          format: double
        dissipasjonsPoretrykkU3:
          type: number
          format: double
        dissipasjonsTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        friksjon:
          type: number
          format: double
        observasjonKode:
          type: string
        observasjonMerknad:
          type: string
          maxLength: 255
        poretrykk1:
          type: number
          format: double
        poretrykk2:
          type: number
          format: double
        poretrykk3:
          type: number
          format: double
        spissmotstand:
          type: number
          format: double
    DynamiskSondering:
      type: object
      description: "sondering som benytter slag på borstrengen ved penetrasjon, benevnes\
        \ også som ramsondering, flere liknende metoder aktuelle<engelsk>sounding\
        \ using strokes on the drill string during penetration, several similar methods\
        \ are applicable</engelsk>"
      properties:
        jsonType:
          const: DynamiskSondering
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        fraBorlengde:
          type: number
          format: double
        tilBorlengde:
          type: number
          format: double
        torvTykkelse:
          type: number
          format: double
        antPrøveuttakForstyrretMatr:
          type: integer
          format: int32
        dynamiskSonderingObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DynamiskSonderingData"
    DynamiskSonderingData:
      type: object
      description: "innsamlede data for utførelse og registrering ved gjennomføring\
        \ av slagsondering\r\n<engelsk>collected data for performance of and recordings\
        \ during percussion sounding</engelsk>"
      properties:
        boretLengde:
          type: number
          format: double
        dreieMoment:
          type: number
          format: double
        fallHøyde:
          type: number
          format: double
        harRotasjon:
          type: boolean
        nedpressingTid:
          type: integer
          format: int32
        observasjonKode:
          type: string
        observasjonMerknad:
          type: string
          maxLength: 255
        prøveuttakNummer:
          type: string
        ramMotstand:
          type: number
          format: double
        rotasjonHastighet:
          type: number
          format: double
        slagFrekvens:
          type: number
          format: double
    EksternIdentifikasjon:
      type: object
      description: "Identifikasjon av et objekt, ivaretatt av den ansvarlige leverandø\
        r inn til NADAG. "
      properties:
        eksternId:
          type: string
          maxLength: 100
        eksternNavnerom:
          type: string
          maxLength: 100
        eksternVersjonId:
          type: string
          maxLength: 100
        eksternLeveringDato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
    EpsgCode:
      type: string
      enum:
      - epsg_4326
      - epsg_5972
      - epsg_5973
      - epsg_5974
      - epsg_5975
      - epsg_5976
      - epsg_32632
      - epsg_32633
      - epsg_32634
      - epsg_32635
      - epsg_32636
    FeltUndersTypeKode:
      type: string
      enum:
      - FELTUNDERSMETODE
      - TOLKETBERGHØYDE
      - TOLKET
      description: Kodeliste for feltundersøkelsestype
    GassData:
      type: object
      description: resultater fra gassmålinger<engelsk>results from gas measurements</engelsk>
      properties:
        CH4:
          type: number
          format: double
        HG:
          type: number
          format: double
    GassMaaling:
      type: object
      description: måling av  gass<engelsk>measurement of gas</engelsk>
      properties:
        jsonType:
          const: GassMaaling
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        fraBorlengde:
          type: number
          format: double
        tilBorlengde:
          type: number
          format: double
        insituTestStartTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        insituTestSluttTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        plassering:
          type: string
        byggNummer:
          type: string
        gassObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/GassData"
    GassProeve:
      type: object
      description: gassprøve fra poreluft<engelsk>gas sample from pore air</engelsk>
      properties:
        jsonType:
          const: GassProeve
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        fraBorlengde:
          type: number
          format: double
        tilBorlengde:
          type: number
          format: double
        prøvetype:
          $ref: "#/components/schemas/ProevetakingType"
        densitetPrøvetaking:
          type: number
          format: double
        miljøtekniskUndersøkelse:
          type: string
    Geometry:
      type: object
    GeometryCollection:
      type: object
      properties:
        type:
          const: GeometryCollection
        geometries:
          type: array
          items:
            $ref: "#/components/schemas/Geometry"
    GeotekniskBoreObservasjonskode:
      type: string
      enum:
      - ANTATTGRUNNVANN
      - AVSLUTTET
      - BLOKKSLUTT
      - BØYDSONDERINGSSTANG
      - FJELLMEDSLAG
      - FJELLNIVÅ
      - FORRIGEKODEFEIL
      - FRIKSJONSJORD
      - FROSSET
      - FROSTISOLERING
      - FUNKSJONSKONTROLLIKKEOK
      - FUNKSJONSKONTROLLOK
      - FYLLING
      - GJENNOMBORRETBLOKKELLERSTEIN
      - HINDRING
      - IKKEMERKBARESPREKKER
      - INGENREGISTRERING
      - INGENVURDERING
      - JORDMEDGRUS
      - JORDMEDSAND
      - JORDMEDSTEIN
      - KULLASKE
      - LEIRE
      - LEIRMORENE
      - MERINFORMASJON
      - MORENEJORD
      - NYMETODE
      - OPPHOLD
      - OPPSPRUKKETFJELL
      - ORGANISKJORD
      - PUMPING
      - PUMPINGSLUTT
      - SANDMEDGRUS
      - SILT
      - SKADET
      - SKARV
      - SLAG
      - SLAGSPYL
      - SLAGSPYLSLUTT
      - SLUTTSLAG
      - SLUTTVRIDNING
      - SONDERINGSTANGAV
      - SPISSDYP
      - SPYLING
      - SPYLINGSLUTT
      - STARTNIVÅ
      - STARTSLAG
      - STARTVRIDNING
      - SVÆRTOPPSPRUKKETFJELL
      - SYNKVEKT0
      - SYNKVEKT0_64
      - TERRENGOVERFLATE
      - TIDLIGERESTOPP
      - TIDSANGIVELSE
      - TORV
      - TØRRSKORPE
      - UBESTEMTJORDART
      - UORGANISKKOHESJONSJORD
      - URENMAKADAM
      - UTENVRIDNING
      - VRIDNING
      description: "oversikt over koder for observasjoner som gjøres ved utførelse\
        \ av en grunnundersøkelse. Benyttes i egenskapen 'observasjonKode' som i mai\
        \ 2024 ble gjort om til tekststreng fra å være knyttet til denne kodelisten.\
        \ Tekstrengen kan inneholde mer enn 1 kode. <engelsk>overview of codes for\
        \ observations conducted during an GeotechnicalBoreholeInvestigation. Used\
        \ in the \"observasjonKode\" attribute, which in May 2024 was changed to a\
        \ text string from being linked to this code list. The text string can contain\
        \ more than 1 code. </engelsk>"
    GeotekniskBorehull:
      type: object
      description: geografisk område representert ved et punkt som er den logiske
        enhet for tolking av laginndeling og egenskaper til de forskjellige jordlag
        <engelsk>geographical area represented by a location which is the logical
        unit for interpretation of stratification and properties for the different
        strata </engelsk>
      properties:
        datafangstdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        digitaliseringsmålestokk:
          type: integer
          format: int32
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        kvalitet:
          $ref: "#/components/schemas/PosisjonskvalitetNADAG"
        oppdateringsdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        antallBorehullUndersøkelser:
          type: integer
          format: int32
        beskrivelse:
          type: string
        boretLengdeTilBerg:
          $ref: "#/components/schemas/BorlengdeTilBerg"
        gjennomboretMedium:
          type: array
          items:
            $ref: "#/components/schemas/GjennomboretMedium"
        posisjon:
          $ref: "#/components/schemas/Point"
        boreNr:
          type: string
        høyde:
          type: number
          format: double
        høydeReferanse:
          type: string
        opprettetDato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        eksternIdentifikasjon:
          $ref: "#/components/schemas/EksternIdentifikasjon"
        kvikkleirePåvisning:
          $ref: "#/components/schemas/KvikkleirePaavisningKode"
        opprinneligGeotekniskUndersID:
          type: string
        opphav:
          type: string
        maksBoretLengde:
          type: number
          format: double
        harObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/GeotekniskObservasjon"
        harUndersøkelse:
          type: array
          items:
            $ref: "#/components/schemas/GeotekniskBorehullUnders"
        harTolkning:
          type: array
          items:
            $ref: "#/components/schemas/GeotekniskTolketPunkt"
        harDokument:
          type: array
          items:
            $ref: "#/components/schemas/GeotekniskDokument"
    GeotekniskBorehullUnders:
      type: object
      description: "geografisk punkt hvor det er utført feltforsøk, prøvetaking, må\
        ling av poretrykk osv. med tilhørende observasjoner <engelsk>geographical\
        \ location where field tests, sampling, pore pressure measurements etc. with\
        \ corresponding observations have been carried out</engelsk>"
      properties:
        datafangstdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        digitaliseringsmålestokk:
          type: integer
          format: int32
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
        kvalitet:
          $ref: "#/components/schemas/PosisjonskvalitetNADAG"
        oppdateringsdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        posisjon:
          $ref: "#/components/schemas/Point"
        boreBeskrivelse:
          type: string
        borehullForløp:
          $ref: "#/components/schemas/LineString"
        boretAzimuth:
          type: number
          format: double
        boretHelningsgrad:
          type: number
          format: double
        boretLengde:
          type: number
          format: double
        boretLengdeTilBerg:
          $ref: "#/components/schemas/BorlengdeTilBerg"
        dybdeFraGittPosisjon:
          type: number
          format: double
        dybdeFraVannoverflaten:
          type: number
          format: double
        lenkeTilTileggsinfo:
          type: string
        opphav:
          type: string
        undersøkelseSlutt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        undersøkelseStart:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        værforholdVedBoring:
          type: string
        høyde:
          type: number
          format: double
        høydeReferanse:
          type: string
        undersøkelseNr:
          type: string
        eksternIdentifikasjon:
          $ref: "#/components/schemas/EksternIdentifikasjon"
        opprettetDato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
        geotekniskMetode:
          $ref: "#/components/schemas/GeotekniskMetodeKode"
        dybdeGrunnvannstand:
          type: number
          format: double
        forboretDiameter:
          type: number
          format: double
        forboretLengde:
          type: number
          format: double
        forboringMetode:
          type: string
        stoppKode:
          $ref: "#/components/schemas/GeotekniskStoppkode"
        forboretStartLengde:
          type: number
          format: double
        metode:
          type: array
          items:
            $ref: "#/components/schemas/Geotekniskmetode"
        harDokument:
          type: array
          items:
            $ref: "#/components/schemas/GeotekniskDokument"
    GeotekniskDokument:
      type: object
      description: dokument(er) tilhørende geotekniske undersøkelsesområder og borehull
        <engelsk>accompanying documents to geotechnical investigation areas and boreholes</engelsk>
      properties:
        dokumentID:
          type: string
        dokumentNøkkel:
          type: string
        dokumentType:
          type: string
        dokumentFilnavn:
          type: string
        dokumentURL:
          type: string
        innholdType:
          type: string
        beskrivelse:
