        hylseRadieKorreksjon:
          type: number
          format: double
          description: "<engelsk>Gets or sets the sleeve distance correction [m].\r\
            \n@value The sleeve distance correction.</engelsk>"
        inSituPoretrykkObservasjon:
          type: array
