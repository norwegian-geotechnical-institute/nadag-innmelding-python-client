          description: kapasitet for anvendt nedpressingsutstyr<engelsk>capacity for
            applied thrust machine</engelsk>
        nedpressningsHastighet:
          type: number
          format: double
          description: nedpressingshastighet ved penetrasjon av trykksonderingsstenger
