            \ <engelsk>initial pore pressure at the start of the dissipation test\
            \ in CPTU</engelsk>"
        resistivitet:
          type: number
          format: double
          description: "elektrisk motstand når den går gjennom et materiale, måles\
            \ ved gjennomføring av RCPTU-forsøk. Måles i [Ωm] (ohm-meter). <engelsk>electrical\
            \ resistivity, measured in a RCPTU-test (?m) </engelsk>"
