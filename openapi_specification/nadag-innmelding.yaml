---
openapi: 3.1.0
components:
  schemas:
    AkviferType:
      type: string
      enum:
      - ÅPEN
      - ARTESISK
      - LUKKET
      - UTETT
      - IKKE_ANGITT
      description: oversikt over mulige akvifertyper for grunnvannsmålinger<engelsk>overview
        of possible aquifer types for ground water measurements</engelsk>
    AttachmentInfoDto:
      type: object
      description: Attachment info result
      properties:
        attachmentId:
          type: string
          description: Identifier for the attachment
        uniqId:
          type: string
          description: Uniq identifier for the attachment (base64 encoded)
    AttachmentInfosDto:
      type: object
      description: Attachment infos result
      properties:
        attachmentInfos:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInfoDto"
    BlokkProeve:
      type: object
      description: "fysisk prøvemateriale manuelt skjært ut fra bunnen av en utgravning\
        \ eller ved hjelp av spesialutviklet prøvetakingsutstyr\r\n\r\n<engelsk>physical\
        \ sample manually cut from the bottom of a ditch or with special sample equipment</engelsk>"
      properties:
        jsonType:
          const: BlokkProeve
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
          type: object
          description: 'unik identifikasjon av et objekt '
        fraBorlengde:
          type: number
          format: double
          description: "lengde målt fra toppen av kurven/linja som beskriver borehullforlø\
            pet [m] <engelsk>distance measured from the top of  the curve describing\
            \ the borehole geometry</engelsk>"
        tilBorlengde:
          type: number
          format: double
          description: "lengde målt fra toppen av kurven/linja som beskriver borehullforlø\
            pet [m] <engelsk>distance measured from the top of  the curve describing\
            \ the borehole geometry</engelsk>"
        prøvetype:
          $ref: "#/components/schemas/ProevetakingType"
          type: string
          description: "klassifisering av fysisk prøvemateriale, avhengig av type\
            \ prøvetaking og jordart<engelsk>classification of sampled material, depending\
            \ on type of sampling and soil type</engelsk>"
        densitetPrøvetaking:
          type: number
          format: double
          description: "tyngde pr. volumenhet [kN/m3] <engelsk>gravity by unit of\
            \ space (kN/m3)</engelsk>"
        miljøtekniskUndersøkelse:
          type: string
          description: beskrivelse og resultater fra miljøteknisk undersøkelse <engelsk>description
            and results from environmental investigation<engelsk>
    BorlengdeTilBerg:
      type: object
      required:
      - borlengdeKvalitet
      description: "dybde til fjell som ikke er målt men basert på tolkning\r\n\r\n\
        <engelsk>\r\ndepth to bedrock based on interpretation\r\n</engelsk>"
      properties:
        borlengdeKvalitet:
          $ref: "#/components/schemas/KvalitetBorlengdeTilBerg"
          type: string
          description: "beskriver om dybden til berg er antatt eller påvist med en\
            \ sikker metode\r\n\r\n<engelsk> \r\ndefines the quality of the depth\
            \ information either assumed or confirmed by a secure method\r\n</engelsk>"
        borlengdeTilBerg:
          type: number
          format: double
          description: "dybde til fjell som ikke er målt men basert på tolkning [m]\r\
            \n\r\n<engelsk>\r\ndepth to bedrock based on interpretation\r\n</engelsk>"
    Coordinates:
      type: array
      items:
        type: number
        format: double
    CoordinatesList:
      type: array
      items:
        $ref: "#/components/schemas/Coordinates"
    CoordinatesLists:
      type: array
      items:
        $ref: "#/components/schemas/CoordinatesList"
    DeformasjonMaaleData:
      type: object
      description: data fra måling av setning ved angitt måletidspunkt<engelsk>data
        from measurements of settlements at a given time</engelsk>
      properties:
        måleDato:
          type: string
          format: date
          examples:
          - 2022-03-10
          description: dato for utførelse av målingen<engelsk>date for measurements</engelsk>
        måleTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: tidspunkt for gjennomføring av målingen<engelsk>time for measurements</engelsk>
        deformasjonObservasjonKode:
          $ref: "#/components/schemas/DeformasjonObservasjonKode"
          type: string
          description: observasjonskoder for markering av hendelser i setningsmålingen<engelsk>observation
            codes for marking of incidents during the measurements</engelsk>
        observasjonMerknad:
          type: string
          maxLength: 255
          description: merknad til observasjoner i setningsmålingen<engelsk>remarks
            to observations made during the measurements</engelsk>
        setning:
          type: number
          format: double
          description: "vertikal komponent av målt deformasjon. observert høydenivå\
            \ (z) for setningsmåling [m] <engelsk>vertical component of measured deformation.\
            \ observed reference level (z) for the settlements</engelsk>"
        deformasjonX:
          type: number
          format: double
          description: "deformasjonskomponent i x-retning. observert høydenivå (z)\
            \ for setningen [m]<engelsk>deformation component in x-direction. observed\
            \ reference level (z) for the settlements</engelsk>"
        deformasjonY:
          type: number
          format: double
          description: "deformasjonskomponent i y-retning. observert høydenivå (z)\
            \ for setningen [m]<engelsk>deformation component in y-direction. observed\
            \ reference level (z) for the settlements</engelsk>"
        deformasjonZ:
          type: number
          format: double
          description: "deformasjonskomponent i z-retning. observert høydenivå (z)\
            \ for setningen [m]<engelsk>deformation component in z-direction. observed\
            \ reference level (z) for the settlements</engelsk>"
        erGyldig:
          type: boolean
          description: "gyldighet av data, hvis falsk så er det kun til informasjon\
            \ <engelsk> validity of data, if false only to be used as information</engelsk>"
        boretLengde:
          type: number
          format: double
          description: "total lengde av borehullets forløp, tilsvarer dyp ved vertikal\
            \ boring [m] <engelsk>total length of the investigation in the physical\
            \ borehole, the same as depth in a vertical borehole</engelsk>"
        observasjonKode:
          type: string
          description: "observasjonskoder for markering av hendelser. Kodene er (0..*)\
            \ tallkoder gitt i en tekststreng med mellomrom mellom hver kode hvis\
            \ mer enn 1. Kodene er beskrevet i kodelisten GeotekniskBoreObservasjonskode.\r\
            \n<engelsk>observation codes for marking of incidents. The codes are (0..*)\
            \ numeric codes given in a text string with spaces between each code if\
            \ more than 1. The codes are described in the code list GeotekniskBoreObservasjonskode.</engelsk>"
    DeformasjonMaaling:
      type: object
      description: undersøkelse for måling av setninger og deformasjoner i felt<engelsk>investigation
        for measurement of settlements and deformations in the field</engelsk>
      properties:
        jsonType:
          const: DeformasjonMaaling
        datafangstdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: "dato når objektet siste gang ble registrert/observert/målt\
            \ i terrenget\r\n\r\nMerknad: I mange tilfeller er denne forskjellig fra\
            \ Oppdateringsdato, da registrerte endringer kan bufres i en kortere eller\
            \ lengre periode før disse legges inn i databasen.\r\nVed førstegangsregistrering\
            \ settes Datafangstdato lik førsteDatafangstdato."
        digitaliseringsmålestokk:
          type: integer
          format: int32
          description: "kartmålestokk registreringene/ datene er hentet fra/ registrert\
            \ på\r\n\r\nEksempel: 1:50 000 = 50000."
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
          type: object
          description: "unik identifikasjon av et objekt \r\n\r\nMerknad: Bør bruke\
            \ UUID.  se http://en.wikipedia.org/wiki/UUID\r\nDe som ikke benytter\
            \ UUID må selv sørge for at denne er globalt unik."
        kvalitet:
          $ref: "#/components/schemas/PosisjonskvalitetNADAG"
          type: object
          description: "beskrivelse av kvaliteten på stedfestingen\r\n\r\nMerknad:\
            \ Denne er identisk med ..KVALITET i tidligere versjoner av SOSI."
        oppdateringsdato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: "dato for siste endring på objektetdataene \r\n\r\nMerknad:\
            \ \r\nOppdateringsdato kan være forskjellig fra Datafangsdato ved at data\
            \ som er registrert kan bufres en kortere eller lengre periode før disse\
            \ legges inn i datasystemet (databasen).\r\n\r\n-Definition-\r\nDate and\
            \ time at which this version of the spatial object was inserted or changed\
            \ in the spatial data set. "
        posisjon:
          $ref: "#/components/schemas/Point"
          type: object
          description: "sted objektet eksisterer på\r\n\r\n<engelsk>\r\nthe actual\
            \ position determined by measuring device\r\n</engelsk>"
        observasjonStart:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: "startdato for observasjon\r\n\r\n<engelsk>\r\nstarting date\
            \ of the observation\r\n</engelsk>"
        observasjonSlutt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: "sluttdato for observasjon\r\n\r\n<engelsk>\r\nending date\
            \ of the observation\r\n</engelsk>"
        observatør:
          type: string
          description: "identifikasjon av operatøren som utfører observasjonen\r\n\
            \r\n<engelsk>\r\nIdentification of the operator performing the observation\r\
            \n</engelsk>"
        opphav:
          type: string
          description: "referanse til opphavsmaterialet, kildematerialet, organisasjons/publiseringskilde\r\
            \n\r\nMerknad: \r\nKan også beskrive navn på person og årsak til oppdatering\r\
            \n\r\n<engelsk>\r\nreference to copyright, source, organization/publication\
            \ source\r\n\r\nNote: May also include name of person and cause of update\r\
            \n\r\n</engelsk>"
        boreBeskrivelse:
          type: string
          description: ""
        boretAzimuth:
          type: number
          format: double
          description: vinkelen mellom en referansevektor i et referanseplan og en
            annen vektor i det samme planet som peker mot noe av interesse
        boretHelningsgrad:
          type: number
          format: double
          description: "helning hvor  90 grader er vertikalt , 0 grader er horisontalt"
        boretLengde:
          type: number
          format: double
          description: "total lengde av borehullets forløp, tilsvarer dyp ved vertikal\
            \ boring"
        boretLengdeTilBerg:
          $ref: "#/components/schemas/BorlengdeTilBerg"
          type: object
          description: dybde til fjell som ikke er målt men basert på tolkning
        dybdeFraGittPosisjon:
          type: number
          format: double
          description: "avstanden fra måleutstyret og ned til det punkt på jordoverflaten\
            \ hvor boring/måling faktisk starter\r\n\r\nMerknad: Borehullundersøkelsens\
            \ posisjon er vanligvis angitt med x,y,z-koordinat. Disse verdiene representerer\
            \ vanligvis et punkt på jordoverflaten. Dybden fra denne gitte posisjon\
            \ vil da være 0. Hvis boringen derimot er utført fra flåte,  skip eller\
            \ is, er det viktig at dybdeFraGittPosisjon blir angitt. Denne vil da\
            \ være avstanden fra måleutstyrets senter (0 dybde) og ned til havbunnen,\
            \ innsjøbunnen eller elvebunnen hvor sonderingen/boringen faktisk starter\
            \ fra).\r\n\r\n<engelsk>\r\ndistance from the drill or measure equipment\
            \ down to the vertical level where the borehole/measurement actually begins\r\
            \n\r\nNote: This is important to specify if the drilling/sounding is performed\
            \ from e.g. a raft, ship or from ice. The depth will then be the depth\
            \ from the measuring equipments origin (0 depth) and down to where drilling/sounding\
            \ actually begins (on the sea surface, bottom of a lake or river, etc.)\r\
            \n\r\n</engelsk>"
        dybdeFraVannoverflaten:
          type: number
          format: double
          description: den lengden hvor sonderingsutstyret befinner seg i vann
        lenkeTilTileggsinfo:
          type: string
          description: Lenke til mer informasjon (URL)
        værforholdVedBoring:
          type: string
          description: "beskrivelse av værforhold under utførelsen av borehullundersø\
            kelsen\r\n<engelsk>\r\nWeather conditions - general description.\r\n</engelsk>"
        høyde:
          type: number
          format: double
          description: "Høyde for observasjon ved start observasjon [m]"
        høydeReferanse:
          $ref: "#/components/schemas/NADAG_Hoeyderef"
          type: string
          description: "Referansesystem for høydeangivelse, som EPSG-kode."
        undersøkelseNr:
          type: string
          description: Nummer på observasjon benyttet i den geotekniske undersøkelsen
        eksternIdentifikasjon:
          $ref: "#/components/schemas/EksternIdentifikasjon"
          type: object
          description: "Identifikasjon av et objekt, ivaretatt av den ansvarlige levernadø\
            r, som kan benyttes av eksterne applikasjoner som referanse til objektet. "
        opprettetDato:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: Når objektet ble opprettet i database (Nadag)
        dybdeGrunnvannstand:
          type: number
          format: double
          description: "dybde [m] fra terrengoverflaten til det nivå i grunnen der\
            \ alle porene i jorden er mettet med vann og poretrykket begynner å stige\
            \ <engelsk>depth [m] from the terrain surface to the level in the ground\
            \ where all voids are saturated with water, and where the pore pressure\
            \ starts to increase</engelsk>"
        forboretDiameter:
          type: number
          format: double
          description: "diameter [mm] av forboret hull i en borhullundersøkelse <engelsk>diameter\
            \ (mm)\t of a predrilled hole in a borehole investigation</engelsk>"
        forboretLengde:
          type: number
          format: double
          description: "Lengde[m] av forboret hull i en borhullundersøkelse <engelsk>Length[m]\
            \ of a predrilled borehole in a borehole investigation<engelsk>"
        forboringMetode:
          type: string
          description: metode brukt til boring uten registrering av data<engelsk>pre
            boring method</engelsk>
        stoppKode:
          $ref: "#/components/schemas/GeotekniskStoppkode"
          type: string
          description: tosifret tall som benyttes for å angi årsak til avslutning
            av borehullundersøkelse<engelsk>code used to explain the reason for termination
            of a borehole investigation<engelsk>
        forboretStartLengde:
          type: number
          format: double
          description: "startlengde[m] for hvor forboring startet i en borhullundersø\
            kelse <engelsk>start depth[m] where the predrilling in the  borehole investigation\
            \ started<engelsk>"
        absoluttverdi:
          type: boolean
          description: "verdi for målt bevegelse, uten angitt forteg<engelsk>value\
            \ for measured deformation, without sign</engelsk>"
        installasjonTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: tidspunktet måleren ble installert<engelsk>time of installation
            for the settlement gauge</engelsk>
        installasjonNivå:
          type: number
          format: double
          description: "dybdemåleren er installert i og det punkt der setningen må\
            les (z-nivå installasjon) [m] <engelsk>depth of the settlement gauge where\
            \ settlements are recorded (z-level installation)</engelsk>"
        målertype:
          type: string
          description: "type setningsmåler (setningsplate, setningsbolt, slange)<engelsk>type\
            \ of settlement gauge (settlement plate, bolt, settlement hose)</engelsk>"
        målepunkt:
          type: number
          format: double
          description: "registrering av referansepunkt for setningsmåling (z-nivå\
            \ måling). Kan avvike fra installasjonsnivå [m] <engelsk>recording of\
            \ reference level for settlements (z-level measurements). My deviate from\
            \ installation level</engelsk>"
        harOvervåkningObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DeformasjonOvervaakningData"
          description: ""
        harSetningObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DeformasjonMaaleData"
          description: ""
    DeformasjonObservasjonKode:
      type: string
      enum:
      - IKKESPESIFISERT
      - HINDRING
      - SKADET
      - USIKKERT
      description: Kodeliste for å angi deformasjonsobservasjon
    DeformasjonOvervaakningData:
      type: object
      description: "data fra overvåkning av setningsmåling, grunnvannsstand, poretrykk,\
        \ rystelser eller andre overvåkningsdata<engelsk>data from supervision of\
        \ settlements, groundwater table, pore pressure or any other supervision data</engelsk>"
      properties:
        nedreAlarmNivå:
          type: number
          format: double
          description: "kriterium for alarmtilstand, nedre grense for måleverdi [m]\
            \ <engelsk>criterion for alarm conditions, lower limit for measured value</engelsk>"
        øvreAlarmNivå:
          type: number
          format: double
          description: "kriterium for alarmtilstand, øvre grense for måleverdi [m]\
            \ <engelsk>criterion for alarm conditions, upper limit for measured value</engelsk>"
        måleDato:
          type: string
          format: date
          examples:
          - 2022-03-10
          description: "dato for utførelse av målingen\r\n<engelsk>date for measurements</engelsk>"
        måleTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: tidspunkt for gjennomføring av målingen<engelsk>time for measurements</engelsk>
        observasjonMerknad:
          type: string
          maxLength: 255
          description: merknad til observasjoner i setningsmålingen<engelsk>remarks
            to observations made during the measurements</engelsk>
        akvifer:
          $ref: "#/components/schemas/AkviferType"
          type: string
          description: grunnvannsmagasin <engelsk>aquifer (ground water reservoir)</engelsk>
    DilatometerTest:
      type: object
      description: "en enkel innretning, formet som et flatt blad designet for å trykkes\
        \ ned i bakken. Merknad: ble utviklet for å bestemme modulus for en jordart.\r\
        \n<engelsk>a simple device, shaped in the form of a flat blade designed to\
        \ be pushed into the ground Note: It was developed to evaluate the soil modulus.</engelsk>"
      properties:
        jsonType:
          const: DilatometerTest
        identifikasjon:
          $ref: "#/components/schemas/Identifikasjon"
          type: object
          description: 'unik identifikasjon av et objekt '
        fraBorlengde:
          type: number
          format: double
          description: "lengde målt fra toppen av kurven/linja som beskriver borehullforlø\
            pet [m] <engelsk>distance measured from the top of  the curve describing\
            \ the borehole geometry</engelsk>"
        tilBorlengde:
          type: number
          format: double
          description: "lengde målt fra toppen av kurven/linja som beskriver borehullforlø\
            pet [m] <engelsk>distance measured from the top of  the curve describing\
            \ the borehole geometry</engelsk>"
        insituTestStartTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: tidspunkt for start av in situ prøvningen<engelsk>start time
            for in situ testing</engelsk>
        insituTestSluttTidspunkt:
          type: string
          format: date-time
          examples:
          - 2022-03-10T12:15:50-04:00
          description: tidspunkt for stopp av in situ prøvningen<engelsk>stop time
            for in situ testing</engelsk>
        materialIndeks:
          type: number
          format: double
          description: materialindeks<engelsk>material index</engelsk>
        horisontalSpenningIndeks:
          type: number
          format: double
          description: horisontalspenning index<engelsk>horizontal stress index</engelsk>
        dilatometerModulus:
          type: number
          format: double
          description: dilatometer modulus<engelsk>dilatometer modulus</engelsk>
        dilatometerObservasjon:
          type: array
          items:
            $ref: "#/components/schemas/DilatometerTestData"
          description: ""
    DilatometerTestData:
      type: object
      description: "en enkel innretning, formet som et flatt blad designet for å trykkes\
        \ ned i bakken. Merknad: ble utviklet for å bestemme modulus for en jordart.\r\
        \n<engelsk>a simple device, shaped in the form of a flat blade designed to\
        \ be pushed into the ground Note: It was developed to evaluate the soil modulus.</engelsk>"
      properties:
        boretDybde:
          type: number
          format: double
          description: "dybde fra 0 nivå, hvor z verdien til undersøkelsens posisjon\
            \ er satt til 0. Angir hvor dypt det er boret.\r\n<engelsk>depth from\
            \ zero level, the z value of investigation start point is 0. drilling\
            \ depth [m]\r\n</engelsk>"
        observasjonMerknad:
          type: string
          maxLength: 255
          description: tekst som beskriver observasjonen <engelsk>description of the
            observation</engelsk>
        observasjonKode:
          type: string
          description: kode som angir observasjonen. Kodene er (0..*) tallkoder gitt
            i en tekststreng med mellomrom mellom hver kode hvis mer enn 1. Kodene
            er beskrevet i kodelisten GeotekniskBoreObservasjonskode.<engelsk>observation
            code according to valid codes. The codes are (0..*) numeric codes given
            in a text string with spaces between each code if more than 1. The codes
            are described in the code list GeotekniskBoreObservasjonskode. </engelsk>
        kontaktTrykkP0:
          type: number
          format: double
          description: gasstrykk når membran ikke lenger har kontakt <engelsk>membrane
            lift-off pressure</engelsk>
        ekspansjonTrykkP1:
          type: number
          format: double
          description: "gasstrykk når senter av membran har flyttet seg 1,1 mm <engelsk>gass\
            \ pressure when membrane has moved 1,1 mm</engelsk>"
        horisontalKraft:
          type: number
          format: double
          description: horisontal last<engelsk>horizontal load</engelsk>
        poretrykk:
          type: number
          format: double
          description: "trykket i porevannet angitt som kraft pr. flateenhet, med\
            \ atmosfæretrykket som nullpunkt \r\n\r\n<engelsk>registered pore pressure\
            \ [kPa]</engelsk>"
    DissipasjonData:
      type: object
      description: "data fra måling av dissipasjon (drenasje) i felt, aktuelt ved\
        \ utførelse av dissipasjonstest i CPTU<engelsk>data fra måling av dissipasjon\
        \ (drenasje) i felt, aktuelt ved utførelse av dissipasjonstest i CPTU</engelsk>"
      properties:
        boretDybde:
          type: number
          format: double
          description: nivå for utførelse av dissipasjonstest<engelsk>depth below
            the terrain surface or any other given reference level</engelsk>
        dissipasjonsPoretrykkU1:
          type: number
          format: double
          description: reduksjon av poretrykk i filterposisjon 1 (spiss) som funksjon
            av tid i dissipasjonstest<engelsk>reduction of pore pressure at filter
