          type: number
          format: double
          description: "korrigert sidefriksjon ved nedpressing av trykksonde (friksjonskraft\
            \ dividert med areal av friksjonshylse, korrigert for poretrykkseffekter)\
            \ [MPa] <engelsk>corrected sleeve friction during penetration of the probe\
            \ (friction sleeve force divided by area of the friction sleeve, corrected\
            \ for pore pressure effects)</engelsk>"
        korrigertNedpressningsKraft:
          type: number
          format: double
          description: "korrigert last på overflaten for nedpressing av trykksonde\
            \ med stenger [kPa] <engelsk>corrected load on the surface for penetration\
            \ of the test rods and probe</engelsk>"
        nedpressingHastighet:
          type: number
          format: double
          description: nedpressingsdistanse for trykksonde per tidsenhet (2 cm/sek)
            <engelsk>penetration rate for probe (2 cm/sec)</engelsk>
        nedpressingsKraft:
          type: number
          format: double
          description: anvendt last på overflaten for nedpressing av trykksonde med
            stenger <engelsk>applied thrust load on the surface for penetration of
            the test rods and probe</engelsk>
        nedpressingsTid:
          type: integer
          format: int32
          description: "tid for nedpressing av sonden til ønsket eller annen angitt\
